    - name: Apply NSIS long string patch
      shell: pwsh
      run: |
        $patchArchive = Join-Path $env:RUNNER_TEMP "nsis-${{ inputs.nsis-version }}-strlen_8192.zip"
        Invoke-WebRequest "https://downloads.sourceforge.net/project/nsis/NSIS%203/${{ inputs.nsis-version }}/nsis-${{ inputs.nsis-version }}-strlen_8192.zip" -OutFile $patchArchive -MaximumRedirection 10
        Expand-Archive $patchArchive -DestinationPath "C:\Program Files (x86)\NSIS" -Force

    - name: Install NSIS EnvVar plugin
      shell: pwsh
      run: |
        $pluginArchive = Join-Path $env:RUNNER_TEMP "EnVar_plugin.zip"
        Invoke-WebRequest https://nsis.sourceforge.io/mediawiki/images/7/7f/EnVar_plugin.zip -OutFile $pluginArchive
        Expand-Archive $pluginArchive -DestinationPath "C:\Program Files (x86)\NSIS" -Force
