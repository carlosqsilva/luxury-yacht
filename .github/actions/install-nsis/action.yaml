name: Install NSIS
description: Installs NSIS (Windows only)

inputs:
  nsis-version:
    description: "The version of NSIS to install"
    required: true

runs:
  using: composite
  steps:
    - name: Download and install NSIS
      shell: pwsh
      run: |
        $Ts = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
        $Url = "https://downloads.sourceforge.net/project/nsis/NSIS%203/3.10/nsis-3.10-setup.exe?ts=$Ts&use_mirror=autoselect"
        $Installer = "$env:RUNNER_TEMP\nsis-3.10-setup.exe"

        Invoke-WebRequest `
          -Uri $Url `
          -OutFile $Installer `
          -MaximumRedirection 10 `
          -UserAgent "Wget/1.21.4"

        if ((Get-Item $Installer).Length -lt 1MB) {
          Get-Content $Installer -TotalCount 20
          throw "Downloaded file is too small; likely got HTML instead of installer"
        }

        Start-Process -FilePath $Installer -ArgumentList "/S" -Wait

        $NsisPath = "${env:ProgramFiles(x86)}\NSIS"
        if (-not (Test-Path "$NsisPath\makensis.exe")) {
          throw "NSIS installation failed"
        }

        echo "$NsisPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

